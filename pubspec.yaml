name: flutter_wisenote
description: "百智(WiseNote)是一款智能音频录制与管理平台,通过蓝牙录音设备实现专业级音频采集、云端同步、智能整理."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # https://pub.dev/packages/logging
  # 日志记录库，用于记录应用程序的日志信息
  logging: ^1.3.0

  # https://pub.dev/packages/cupertino_icons
  # 提供 iOS 风格的图标集，适用于 Cupertino 风格的应用界面
  cupertino_icons: ^1.0.8

  # https://pub.dev/packages/flutter_blue_plus
  # BLE 蓝牙通信插件，支持 iOS/Android，用于扫描、连接蓝牙设备和数据传输
  flutter_blue_plus: ^2.0.2

  # https://pub.dev/packages/dio
  # 强大的 HTTP 客户端库，支持拦截器、全局配置、FormData、文件上传/下载、请求取消等功能
  dio: ^5.9.0

  # https://pub.dev/packages/get
  # 高性能的状态管理、智能的依赖注入和便捷的路由管理解决方案
  get: ^4.7.3

  # https://pub.dev/packages/shared_preferences
  # 简单的键值对存储插件，用于存储轻量级持久化数据
  shared_preferences: ^2.5.4

  # https://pub.dev/packages/flutter_secure_storage
  # 安全存储插件，用于存储敏感数据如 Token，iOS 端使用 Keychain，Android 端使用 EncryptedSharedPreferences
  flutter_secure_storage: ^10.0.0

  # https://pub.dev/packages/path_provider
  # 获取设备常用目录路径的插件，支持获取文档目录、临时目录等
  path_provider: ^2.1.5

  # https://pub.dev/packages/image_picker
  # 图片选择器插件，支持从相册选择或拍照获取图片
  image_picker: ^1.2.1

  # https://pub.dev/packages/cached_network_image
  # 网络图片加载和缓存插件，支持占位符、错误处理和内存缓存
  cached_network_image: ^3.4.1

  # https://pub.dev/packages/flutter_svg
  # SVG 图片加载插件，用于在应用中显示 SVG 图片
  flutter_svg: ^2.2.3

  # https://pub.dev/packages/fluttertoast
  # Toast 消息提示插件，用于显示简短的消息提示
  fluttertoast: ^9.0.0

  # https://pub.dev/packages/easy_refresh
  # 下拉刷新和上拉加载插件，支持多种刷新样式和自定义动画
  easy_refresh: ^3.4.0

  # https://pub.dev/packages/webview_flutter
  # WebView 插件，用于在应用中显示网页内容，如用户协议、隐私政策等
  webview_flutter: ^4.13.0

  # https://pub.dev/packages/json_annotation
  # JSON 序列化注解库，配合 json_serializable 使用，用于自动生成 JSON 转换代码
  json_annotation: ^4.9.0

  # https://pub.dev/packages/intl
  # 国际化和本地化库，提供日期、数字、货币格式化等功能
  intl: ^0.20.2

  # https://pub.dev/packages/permission_handler
  # 权限管理插件，用于请求和检查应用权限（蓝牙、相机、存储等）
  permission_handler: ^12.0.1

  # https://pub.dev/packages/uuid
  # UUID 生成库，用于生成唯一标识符（设备绑定需要生成 App UUID）
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # https://pub.dev/packages/flutter_lints
  # 代码规范检查工具
  flutter_lints: ^6.0.0

  # https://pub.dev/packages/freezed
  # 数据类生成工具，用于生成数据类和对应的 fromJson 和 toJson 方法
  freezed: ^2.5.7

  # https://pub.dev/packages/build_runner
  # 代码生成工具，用于运行代码生成器（配合 json_serializable 使用）
  build_runner: ^2.4.13

  # https://pub.dev/packages/json_serializable
  # JSON 序列化代码生成器，自动生成 fromJson 和 toJson 方法
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  generate: true

  # 如果需要添加资源文件，取消下面的注释
  # assets:
  #   - images/
  #   - icons/